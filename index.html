        :root {
            --bg-color: #0c0c0d;
            --card-bg: #1e1e1e;
            --primary: #8663df;
            --accent: #ffff4d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--accent);
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .buttons-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent);
            color: #000000;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(255, 255, 77, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 255, 77, 0.5);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(134, 99, 223, 0.2);
        }

        .btn-secondary:hover {
            background-color: var(--primary);
            box-shadow: 0 6px 25px rgba(134, 99, 223, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(134, 99, 223, 0.2);
            border-radius: 16px;
            padding: 30px;
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: var(--primary);
        }

        .card h3 {
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card ul {
            list-style: none;
        }

        .card li {
            color: var(--text-muted);
            margin-bottom: 10px;
            position: relative;
            padding-left: 20px;
        }

        .card li::before {
            content: "•";
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            left: 0;
            top: -2px;
        }

        .pricing {
            margin-top: 80px;
            text-align: center;
        }

        .pricing h2 {
            font-size: 2rem;
